<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TicTacToe">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
    <link rel="shortcut icon" href="icon-192.png" type="image/png">
    <link rel="icon" sizes="192x192" href="icon-192.png" type="image/png">
    <meta name="theme-color" content="#012A62">
    <style>
        :root {
            --neon-cyan: #0098b5;
            --neon-orange: #efa016;
            --dark-gray: #2b2b2b;
            --glow-cyan: 0 0 5px #0098b5, 0 0 10px #0098b5, 0 0 15px #0098b5;
            --glow-orange: 0 0 10px #efa016, 0 0 20px #efa016, 0 0 30px #efa016;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
            max-width: 100%;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, rgb(1, 42, 98) 0%, #0a2050 50%, #153a6e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
            max-width: 100%;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 249, 0.03) 2px, rgba(0, 255, 249, 0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0, 255, 249, 0.03) 2px, rgba(0, 255, 249, 0.03) 4px);
            animation: gridScroll 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridScroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            text-align: center;
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
            padding: 10px 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.15rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #ffffff, var(--neon-orange), #ffffff, var(--neon-orange));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            letter-spacing: 0.05em;
            filter: drop-shadow(0 0 20px rgba(239, 160, 22, 0.6));
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .status {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            height: 2rem;
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        /* ── Mode buttons ── */
        .mode-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            padding: 0.5rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .mode-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 0.8rem 2rem;
            border: 2px solid var(--neon-cyan);
            background: transparent;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            flex: 0 0 auto;
            width: auto;
            position: relative;
            overflow: hidden;
        }

        .mode-btn.active {
            background: rgba(0, 152, 181, 0.2);
            color: var(--neon-cyan);
        }

        .mode-btn:hover {
            background: rgba(0, 152, 181, 0.1);
            color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }

        /* ── TTT Board — metallic frame like Connect4 ── */
        .game-board {
            display: inline-grid;
            grid-template-columns: repeat(3, 110px);
            grid-template-rows: repeat(3, 110px);
            gap: 8px;
            padding: 20px;
            background: rgba(26, 36, 86, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            margin: 0 auto 3rem auto;
        }

        .cell {
            background: linear-gradient(135deg, rgba(26, 39, 86, 0.6), rgba(21, 32, 56, 0.6));
            border: 2px solid #1a2456;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 249, 0.2), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .cell:hover:not(.taken)::before {
            width: 100%;
            height: 100%;
        }

        .cell:hover:not(.taken) {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 249, 0.3);
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            animation: markAppear 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .cell.o {
            color: var(--neon-orange);
            text-shadow: var(--glow-orange);
            animation: markAppear 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes markAppear {
            0%   { transform: scale(0) rotate(180deg); opacity: 0; }
            50%  { transform: scale(1.2) rotate(90deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .cell.winning {
            animation: winningPulse 0.6s ease-in-out infinite;
        }

        @keyframes winningPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px currentColor;
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 40px currentColor;
            }
        }

        /* ── New Game / Reset Stats buttons ── */
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: nowrap;
            margin-bottom: 1.5rem;
            max-width: 386px;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 1rem 1.5rem;
            border: 2px solid var(--neon-cyan);
            background: rgba(0, 255, 249, 0.1);
            color: var(--neon-cyan);
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            flex: 1;
            white-space: nowrap;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 249, 0.2), transparent);
            transition: left 0.5s;
        }

        button:hover {
            background: rgba(0, 255, 249, 0.2);
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
            color: rgba(255, 255, 255, 0.5);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        /* ── Stats ── */
        .stats {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            max-width: 386px;
            margin-left: auto;
            margin-right: auto;
        }

        .stat {
            padding: 0.75rem 1.5rem;
            background: rgba(26, 36, 86, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 249, 0.3);
            backdrop-filter: blur(5px);
            flex: 1;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-value.cyan {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .stat-value.orange {
            color: var(--neon-orange);
            text-shadow: 0 0 10px var(--neon-orange);
        }

        .stat-value.white {
            color: #fff;
        }

        /* ── Logo ── */
        .logo {
            width: 180px;
            height: auto;
            margin-top: 0;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        /* ══════════════════════════════════════
           MOBILE  (max-width: 600px)
           Board: 3 x 88px + 2 x 6px gaps + 2 x 12px padding = 300px
        ══════════════════════════════════════ */
        @media (max-width: 600px) {

            html, body {
                overflow-x: hidden;
            }

            body {
                align-items: flex-start;
                min-height: unset;
                height: auto;
            }

            body::before {
                display: none;
            }

            .container {
                width: 100%;
                max-width: 100%;
                padding-left: 20px;
                padding-right: 20px;
                padding-top: 2.5rem;
                overflow-x: hidden;
            }

            h1 {
                font-size: 2.0rem;
                letter-spacing: 0.03em;
                margin-bottom: 2rem;
            }

            .status {
                font-size: 1.1rem;
                margin-bottom: 1.2rem;
                height: auto;
            }

            /* Top 2 buttons — 300px to match board */
            .mode-selector {
                width: 300px;
                max-width: 300px;
                padding: 0;
                gap: 0.5rem;
                display: flex;
                margin-bottom: 1.1rem;
            }

            .mode-btn {
                padding: 0.6rem 0;
                font-size: 0.72rem;
                flex: 1;
                width: 0;
                min-width: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: clip;
                text-align: center;
                position: relative;
            }

            .mode-btn::before {
                display: none;
            }

            /* Board — 3 x 88px + 2 x 6px + 2 x 12px = 300px */
            .game-board {
                padding: 12px;
                margin-top: 1.5rem;
                margin-bottom: 2.5rem;
                margin-left: auto;
                margin-right: auto;
                grid-template-columns: repeat(3, 88px);
                grid-template-rows: repeat(3, 88px);
                gap: 6px;
            }

            .cell {
                font-size: 2.8rem;
                border-radius: 10px;
            }

            /* Bottom 2 buttons — 300px to match board */
            .controls {
                max-width: 300px;
                gap: 0.5rem;
                margin-bottom: 1.1rem;
            }

            button {
                padding: 0.6rem 0;
                font-size: 0.78rem;
                white-space: nowrap;
                flex: 1;
                max-width: none;
            }

            /* Stats 3 boxes — 300px to match board */
            .stats {
                max-width: 300px;
                gap: 0.5rem;
                margin-top: 1.1rem;
            }

            .stat {
                padding: 0.55rem 0;
                min-width: 0;
            }

            .stat-label {
                font-size: 0.65rem;
            }

            .stat-value {
                font-size: 1.4rem;
            }

            .logo {
                width: 150px;
                margin-top: -0.5rem;
                margin-bottom: 0.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <h1>Tic-Tac-Toe</h1>

        <div class="mode-selector" id="modeSelector">
            <button class="mode-btn active" data-mode="pvp">2 Players</button>
            <button class="mode-btn" data-mode="pvc">VS Computer</button>
        </div>

        <div class="status" id="status">Player X's Turn</div>

        <div class="game-board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button id="reset">New Game</button>
            <button id="resetStats">Reset Stats</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Player X</div>
                <div class="stat-value cyan" id="xWins">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Draws</div>
                <div class="stat-value white" id="draws">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Player O</div>
                <div class="stat-value orange" id="oWins">0</div>
            </div>
        </div>

    <script>
        // ── Sound ──────────────────────────────────────────────
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playMoveSound(isX) {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            const now = ctx.currentTime;
            // X = higher pitch (cyan), O = lower pitch (orange)
            osc.frequency.setValueAtTime(isX ? 520 : 320, now);
            osc.frequency.exponentialRampToValueAtTime(isX ? 420 : 260, now + 0.08);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.11);
        }

        function playWinSound() {
            const ctx = getAudioCtx();
            const freqs = [440, 554, 659, 880];
            freqs.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                const start = ctx.currentTime + i * 0.12;
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0.0001, start);
                gain.gain.exponentialRampToValueAtTime(0.2, start + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.15);
                osc.start(start);
                osc.stop(start + 0.16);
            });
        }

        function playDrawSound() {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            const now = ctx.currentTime;
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.25);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.15, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
            osc.start(now);
            osc.stop(now + 0.3);
        }

        class TicTacToe {
            constructor() {
                this.board = ['', '', '', '', '', '', '', '', ''];
                this.currentPlayer = 'X';
                this.gameActive = true;
                this.gameMode = 'pvp';
                this.stats = this.loadStats();

                this.winningConditions = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8],
                    [0, 3, 6], [1, 4, 7], [2, 5, 8],
                    [0, 4, 8], [2, 4, 6]
                ];

                this.cells = document.querySelectorAll('.cell');
                this.statusDisplay = document.getElementById('status');
                this.resetButton = document.getElementById('reset');
                this.resetStatsButton = document.getElementById('resetStats');
                this.modeButtons = document.querySelectorAll('.mode-btn');

                this.init();
                this.updateStatsDisplay();
            }

            init() {
                this.cells.forEach(cell => {
                    cell.addEventListener('click', (e) => this.handleCellClick(e));
                });
                this.resetButton.addEventListener('click', () => this.resetGame());
                this.resetStatsButton.addEventListener('click', () => this.resetStatsConfirm());
                this.modeButtons.forEach(btn => {
                    btn.addEventListener('click', (e) => this.switchMode(e));
                });
            }

            switchMode(event) {
                const mode = event.target.getAttribute('data-mode');
                this.gameMode = mode;
                this.modeButtons.forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                this.resetGame();
            }

            handleCellClick(event) {
                const cell = event.target;
                const index = parseInt(cell.getAttribute('data-index'));
                if (this.board[index] !== '' || !this.gameActive) return;
                this.makeMove(cell, index);
                this.checkResult();
                if (this.gameActive && this.gameMode === 'pvc' && this.currentPlayer === 'O') {
                    setTimeout(() => this.computerMove(), 500);
                }
            }

            computerMove() {
                if (!this.gameActive) return;
                let move = this.findBestMove();
                if (move !== -1) {
                    const cell = this.cells[move];
                    this.makeMove(cell, move);
                    this.checkResult();
                }
            }

            findBestMove() {
                // 1. Win
                for (let i = 0; i < 9; i++) {
                    if (this.board[i] === '') {
                        this.board[i] = 'O';
                        if (this.checkWin('O')) { this.board[i] = ''; return i; }
                        this.board[i] = '';
                    }
                }
                // 2. Block
                for (let i = 0; i < 9; i++) {
                    if (this.board[i] === '') {
                        this.board[i] = 'X';
                        if (this.checkWin('X')) { this.board[i] = ''; return i; }
                        this.board[i] = '';
                    }
                }
                // 3. Centre
                if (this.board[4] === '') return 4;
                // 4. Corner
                const corners = [0, 2, 6, 8].filter(i => this.board[i] === '');
                if (corners.length > 0) return corners[Math.floor(Math.random() * corners.length)];
                // 5. Any
                const avail = [];
                for (let i = 0; i < 9; i++) { if (this.board[i] === '') avail.push(i); }
                return avail.length > 0 ? avail[Math.floor(Math.random() * avail.length)] : -1;
            }

            checkWin(player) {
                return this.winningConditions.some(cond => cond.every(i => this.board[i] === player));
            }

            makeMove(cell, index) {
                this.board[index] = this.currentPlayer;
                cell.textContent = this.currentPlayer;
                cell.classList.add('taken', this.currentPlayer.toLowerCase());
                playMoveSound(this.currentPlayer === 'X');
            }

            checkResult() {
                let roundWon = false;
                let winningCombination = null;

                for (let i = 0; i < this.winningConditions.length; i++) {
                    const [a, b, c] = this.winningConditions[i];
                    if (this.board[a] === '' || this.board[b] === '' || this.board[c] === '') continue;
                    if (this.board[a] === this.board[b] && this.board[b] === this.board[c]) {
                        roundWon = true;
                        winningCombination = this.winningConditions[i];
                        break;
                    }
                }

                if (roundWon) {
                    this.statusDisplay.textContent = this.gameMode === 'pvc'
                        ? (this.currentPlayer === 'X' ? 'You Win!' : 'Computer Wins!')
                        : `Player ${this.currentPlayer} Wins!`;
                    this.gameActive = false;
                    winningCombination.forEach(i => this.cells[i].classList.add('winning'));
                    this.updateStats(this.currentPlayer);
                    playWinSound();
                    return;
                }

                if (!this.board.includes('')) {
                    this.statusDisplay.textContent = 'Draw!';
                    this.gameActive = false;
                    this.updateStats('draw');
                    playDrawSound();
                    return;
                }

                this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                this.statusDisplay.textContent = this.gameMode === 'pvc'
                    ? (this.currentPlayer === 'X' ? 'Your Turn' : "Computer's Turn")
                    : `Player ${this.currentPlayer}'s Turn`;
            }

            resetGame() {
                this.board = ['', '', '', '', '', '', '', '', ''];
                this.currentPlayer = 'X';
                this.gameActive = true;
                this.statusDisplay.textContent = this.gameMode === 'pvc' ? 'Your Turn' : "Player X's Turn";
                this.cells.forEach(cell => {
                    cell.textContent = '';
                    cell.classList.remove('taken', 'x', 'o', 'winning');
                });
            }

            updateStats(winner) {
                if (winner === 'X') this.stats.xWins++;
                else if (winner === 'O') this.stats.oWins++;
                else this.stats.draws++;
                this.saveStats();
                this.updateStatsDisplay();
            }

            updateStatsDisplay() {
                document.getElementById('xWins').textContent = this.stats.xWins;
                document.getElementById('oWins').textContent = this.stats.oWins;
                document.getElementById('draws').textContent = this.stats.draws;
            }

            loadStats() {
                const saved = localStorage.getItem('tictactoe-stats');
                return saved ? JSON.parse(saved) : { xWins: 0, oWins: 0, draws: 0 };
            }

            saveStats() {
                localStorage.setItem('tictactoe-stats', JSON.stringify(this.stats));
            }

            resetStatsConfirm() {
                this.stats = { xWins: 0, oWins: 0, draws: 0 };
                this.saveStats();
                this.updateStatsDisplay();
            }
        }

        const game = new TicTacToe();
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('ServiceWorker registered'))
                    .catch(err => console.log('ServiceWorker failed:', err));
            });
        }
    </script>
