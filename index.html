<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: rgb(0, 152, 181);
            --neon-orange: rgb(239, 160, 22);
            --dark-bg: rgb(1, 42, 98);
            --grid-color: #1a2456;
            --glow-cyan: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 30px var(--neon-cyan);
            --glow-orange: 0 0 10px var(--neon-orange), 0 0 20px var(--neon-orange), 0 0 30px var(--neon-orange);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, rgb(1, 42, 98) 0%, #0a2050 50%, #153a6e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 249, 0.03) 2px, rgba(0, 255, 249, 0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 0, 255, 0.03) 2px, rgba(255, 0, 255, 0.03) 4px);
            animation: gridScroll 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridScroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            text-align: center;
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            width: 200px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, var(--neon-orange), #ffffff, var(--neon-orange));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            filter: drop-shadow(0 0 20px rgba(239, 160, 22, 0.5));
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .status {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            height: 2rem;
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .mode-selector {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
            background: rgba(26, 36, 86, 0.3);
            padding: 0.5rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 152, 181, 0.2);
            display: inline-flex;
        }

        .mode-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border: 2px solid transparent;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            color: var(--dark-bg);
            background: rgba(0, 152, 181, 0.9);
        }

        .mode-btn.active:hover {
            color: var(--dark-bg);
        }

        .mode-btn.active {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            background: rgba(0, 152, 181, 0.2);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .game-board {
            display: inline-grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 8px;
            padding: 20px;
            background: rgba(26, 36, 86, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }

        .cell {
            background: linear-gradient(135deg, rgba(26, 36, 86, 0.6), rgba(22, 33, 62, 0.6));
            border: 2px solid var(--grid-color);
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 249, 0.2), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .cell:hover:not(.taken)::before {
            width: 100%;
            height: 100%;
        }

        .cell:hover:not(.taken) {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 249, 0.3);
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x {
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            animation: markAppear 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .cell.o {
            color: var(--neon-orange);
            text-shadow: var(--glow-orange);
            animation: markAppear 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes markAppear {
            0% { transform: scale(0) rotate(180deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(90deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .cell.winning {
            animation: winningPulse 0.6s ease-in-out infinite;
        }

        @keyframes winningPulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 20px currentColor;
            }
            50% { 
                transform: scale(1.1);
                box-shadow: 0 0 40px currentColor;
            }
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 1rem 2.5rem;
            border: 2px solid var(--neon-cyan);
            background: rgba(0, 255, 249, 0.1);
            color: var(--neon-cyan);
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 100%;
            background: var(--neon-cyan);
            transform: translate(-50%, -50%);
            transition: width 0.3s ease;
            z-index: -1;
        }

        button:hover {
            color: var(--dark-bg);
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        button:hover::before {
            width: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            margin-top: 2rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .stat {
            padding: 0.75rem 1.5rem;
            background: rgba(26, 36, 86, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 249, 0.3);
            backdrop-filter: blur(5px);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-value.cyan {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .stat-value.orange {
            color: var(--neon-orange);
            text-shadow: 0 0 10px var(--neon-orange);
        }

        .stat-value.white {
            color: #fff;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 0.1em;
            }

            .game-board {
                grid-template-columns: repeat(3, 90px);
                grid-template-rows: repeat(3, 90px);
                gap: 6px;
                padding: 15px;
            }

            .cell {
                font-size: 2.5rem;
            }

            button {
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }

            .stats {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>

        <h1>Tic-Tac-Toe</h1>
        
        <div class="mode-selector" id="modeSelector">
            <button class="mode-btn active" data-mode="pvp">2 Players</button>
            <button class="mode-btn" data-mode="pvc">vs Computer</button>
        </div>
        
        <div class="status" id="status">Player X's Turn</div>
        
        <div class="game-board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button id="reset">New Game</button>
            <button id="resetStats">Reset Stats</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Player X</div>
                <div class="stat-value cyan" id="xWins">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Draws</div>
                <div class="stat-value white" id="draws">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Player O</div>
                <div class="stat-value orange" id="oWins">0</div>
            </div>
        </div>
    </div>

    <script>
        class TicTacToe {
            constructor() {
                this.board = ['', '', '', '', '', '', '', '', ''];
                this.currentPlayer = 'X';
                this.gameActive = true;
                this.gameMode = 'pvp'; // 'pvp' or 'pvc' (player vs computer)
                this.stats = this.loadStats();
                
                this.winningConditions = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                    [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
                    [0, 4, 8], [2, 4, 6]  // Diagonals
                ];

                this.cells = document.querySelectorAll('.cell');
                this.statusDisplay = document.getElementById('status');
                this.resetButton = document.getElementById('reset');
                this.resetStatsButton = document.getElementById('resetStats');
                this.modeButtons = document.querySelectorAll('.mode-btn');

                this.init();
                this.updateStatsDisplay();
            }

            init() {
                this.cells.forEach(cell => {
                    cell.addEventListener('click', (e) => this.handleCellClick(e));
                });

                this.resetButton.addEventListener('click', () => this.resetGame());
                this.resetStatsButton.addEventListener('click', () => this.resetStatsConfirm());
                
                this.modeButtons.forEach(btn => {
                    btn.addEventListener('click', (e) => this.switchMode(e));
                });
            }

            switchMode(event) {
                const mode = event.target.getAttribute('data-mode');
                this.gameMode = mode;
                
                // Update button states
                this.modeButtons.forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                
                // Reset game when switching modes
                this.resetGame();
            }

            handleCellClick(event) {
                const cell = event.target;
                const index = parseInt(cell.getAttribute('data-index'));

                if (this.board[index] !== '' || !this.gameActive) {
                    return;
                }

                // Player X always goes first in both modes
                this.makeMove(cell, index);
                this.checkResult();

                // If game is still active and in PvC mode and it's O's turn, let computer play
                if (this.gameActive && this.gameMode === 'pvc' && this.currentPlayer === 'O') {
                    setTimeout(() => this.computerMove(), 500);
                }
            }

            computerMove() {
                if (!this.gameActive) return;

                // Smart AI: Try to win, block player, or take strategic position
                let move = this.findBestMove();
                
                if (move !== -1) {
                    const cell = this.cells[move];
                    this.makeMove(cell, move);
                    this.checkResult();
                }
            }

            findBestMove() {
                // 1. Check if computer can win
                for (let i = 0; i < 9; i++) {
                    if (this.board[i] === '') {
                        this.board[i] = 'O';
                        if (this.checkWin('O')) {
                            this.board[i] = '';
                            return i;
                        }
                        this.board[i] = '';
                    }
                }

                // 2. Check if need to block player
                for (let i = 0; i < 9; i++) {
                    if (this.board[i] === '') {
                        this.board[i] = 'X';
                        if (this.checkWin('X')) {
                            this.board[i] = '';
                            return i;
                        }
                        this.board[i] = '';
                    }
                }

                // 3. Take center if available
                if (this.board[4] === '') {
                    return 4;
                }

                // 4. Take a corner
                const corners = [0, 2, 6, 8];
                const availableCorners = corners.filter(i => this.board[i] === '');
                if (availableCorners.length > 0) {
                    return availableCorners[Math.floor(Math.random() * availableCorners.length)];
                }

                // 5. Take any available space
                const availableSpaces = [];
                for (let i = 0; i < 9; i++) {
                    if (this.board[i] === '') {
                        availableSpaces.push(i);
                    }
                }
                
                if (availableSpaces.length > 0) {
                    return availableSpaces[Math.floor(Math.random() * availableSpaces.length)];
                }

                return -1;
            }

            checkWin(player) {
                return this.winningConditions.some(condition => {
                    return condition.every(index => this.board[index] === player);
                });
            }

            makeMove(cell, index) {
                this.board[index] = this.currentPlayer;
                cell.textContent = this.currentPlayer;
                cell.classList.add('taken');
                cell.classList.add(this.currentPlayer.toLowerCase());
            }

            checkResult() {
                let roundWon = false;
                let winningCombination = null;

                for (let i = 0; i < this.winningConditions.length; i++) {
                    const condition = this.winningConditions[i];
                    const a = this.board[condition[0]];
                    const b = this.board[condition[1]];
                    const c = this.board[condition[2]];

                    if (a === '' || b === '' || c === '') {
                        continue;
                    }

                    if (a === b && b === c) {
                        roundWon = true;
                        winningCombination = condition;
                        break;
                    }
                }

                if (roundWon) {
                    if (this.gameMode === 'pvc') {
                        this.statusDisplay.textContent = this.currentPlayer === 'X' ? 'You Win!' : 'Computer Wins!';
                    } else {
                        this.statusDisplay.textContent = `Player ${this.currentPlayer} Wins!`;
                    }
                    this.gameActive = false;
                    this.highlightWinningCells(winningCombination);
                    this.updateStats(this.currentPlayer);
                    return;
                }

                const roundDraw = !this.board.includes('');
                if (roundDraw) {
                    this.statusDisplay.textContent = 'Draw!';
                    this.gameActive = false;
                    this.updateStats('draw');
                    return;
                }

                this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                
                if (this.gameMode === 'pvc') {
                    this.statusDisplay.textContent = this.currentPlayer === 'X' ? 'Your Turn' : "Computer's Turn";
                } else {
                    this.statusDisplay.textContent = `Player ${this.currentPlayer}'s Turn`;
                }
            }

            highlightWinningCells(combination) {
                combination.forEach(index => {
                    this.cells[index].classList.add('winning');
                });
            }

            resetGame() {
                this.board = ['', '', '', '', '', '', '', '', ''];
                this.currentPlayer = 'X';
                this.gameActive = true;
                
                if (this.gameMode === 'pvc') {
                    this.statusDisplay.textContent = 'Your Turn';
                } else {
                    this.statusDisplay.textContent = "Player X's Turn";
                }

                this.cells.forEach(cell => {
                    cell.textContent = '';
                    cell.classList.remove('taken', 'x', 'o', 'winning');
                });
            }

            updateStats(winner) {
                if (winner === 'X') {
                    this.stats.xWins++;
                } else if (winner === 'O') {
                    this.stats.oWins++;
                } else {
                    this.stats.draws++;
                }
                this.saveStats();
                this.updateStatsDisplay();
            }

            updateStatsDisplay() {
                document.getElementById('xWins').textContent = this.stats.xWins;
                document.getElementById('oWins').textContent = this.stats.oWins;
                document.getElementById('draws').textContent = this.stats.draws;
            }

            loadStats() {
                const saved = localStorage.getItem('tictactoe-stats');
                return saved ? JSON.parse(saved) : { xWins: 0, oWins: 0, draws: 0 };
            }

            saveStats() {
                localStorage.setItem('tictactoe-stats', JSON.stringify(this.stats));
            }

            resetStatsConfirm() {
                this.stats = { xWins: 0, oWins: 0, draws: 0 };
                this.saveStats();
                this.updateStatsDisplay();
            }
        }

        // Initialize the game
        const game = new TicTacToe();
    </script>

                        console.log('ServiceWorker registered successfully');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);

        }
